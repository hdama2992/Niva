services:
  postgres:
    image: postgres:16-alpine
    container_name: niva-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: niva
      POSTGRES_USER: niva
      POSTGRES_PASSWORD: niva
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U niva -d niva"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
