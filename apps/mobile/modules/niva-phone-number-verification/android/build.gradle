plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.nivaphonenumberverification'
version = '0.1.0'

android {
  namespace "expo.modules.nivaphonenumberverification"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation platform('com.google.firebase:firebase-bom:34.15.0')
  implementation 'com.google.firebase:firebase-pnv'
}
